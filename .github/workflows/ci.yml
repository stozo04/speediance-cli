name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    name: build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: Build
        run: go build ./...
      - name: Test (race)
        run: go test -race ./...

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          # golangci-lint embeds the Go type-checker of the toolchain it was
          # built with, so it must be built with a Go >= the toolchain it lints
          # under (here: stable/go1.26). v2.12.2 is built with go1.26; bump this
          # in lockstep if go.mod's `go` directive ever outpaces the linter,
          # otherwise it panics: "file requires newer Go version ... (built with ...)".
          version: v2.12.2
