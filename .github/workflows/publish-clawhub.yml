name: Publish to ClawHub

on:
  push:
    branches: [main]
    paths:
      - SKILL.md
      - pyproject.toml

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clawhub CLI
        run: npm install -g clawhub

      - name: Publish skill
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: clawhub skill publish . --owner stozo04 --slug speediance --name "Speediance Gym Monster"
